name: CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-core:
    name: Linux
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            ninja-build \
            zlib1g-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          target: desktop
          archives: icu qtbase
          cache: true

      - name: Prepare compiler cache
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore compiler cache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: linux-core-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            linux-core-ccache-${{ github.ref_name }}-
            linux-core-ccache-

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Configure
        run: >
          cmake --preset ci-core-debug
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset ci-core-debug --parallel

      - name: Test
        run: >
          ctest --test-dir build-ninja/ci-core-debug
          --parallel 2
          -LE slow
          --output-on-failure
          --no-tests=error

      - name: Print compiler cache stats
        if: always()
        run: ccache --show-stats

  macos-core:
    name: macOS
    runs-on: macos-15
    timeout-minutes: 35
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: brew install ccache

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          target: desktop
          archives: qtbase
          cache: true

      - name: Prepare compiler cache
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore compiler cache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: macos-core-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            macos-core-ccache-${{ github.ref_name }}-
            macos-core-ccache-

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Configure
        run: >
          cmake --preset core-debug
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DSKYGATE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset core-debug --parallel

      - name: Test
        run: >
          ctest --test-dir build-make/core-debug
          --parallel 2
          -LE slow
          --output-on-failure
          --no-tests=error

      - name: Print compiler cache stats
        if: always()
        run: ccache --show-stats

  windows-core:
    name: Windows
    runs-on: windows-2022
    timeout-minutes: 35
    env:
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 500M

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        shell: pwsh
        run: choco install sccache --yes --no-progress

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase
          cache: true

      - name: Configure vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot -and (Test-Path "C:\vcpkg")) {
            $vcpkgRoot = "C:\vcpkg"
          }
          if (-not $vcpkgRoot) {
            throw "Could not find vcpkg on the Windows runner."
          }
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Prepare compiler cache
        shell: pwsh
        run: New-Item -ItemType Directory -Force $env:SCCACHE_DIR

      - name: Restore compiler cache
        uses: actions/cache@v5
        with:
          path: .sccache
          key: windows-core-sccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            windows-core-sccache-${{ github.ref_name }}-
            windows-core-sccache-

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Configure
        run: >
          cmake --preset core-debug-windows-vcpkg
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          -DCMAKE_POLICY_DEFAULT_CMP0141=NEW
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset core-debug-windows-vcpkg --parallel

      - name: Test
        shell: pwsh
        run: |
          $vcpkgDebugBin = "$PWD\build-ninja\core-debug-windows-vcpkg\vcpkg_installed\x64-windows\debug\bin"
          $vcpkgReleaseBin = "$PWD\build-ninja\core-debug-windows-vcpkg\vcpkg_installed\x64-windows\bin"
          $env:PATH = "$vcpkgDebugBin;$vcpkgReleaseBin;$env:PATH"
          ctest --test-dir build-ninja/core-debug-windows-vcpkg --parallel 2 -LE slow --output-on-failure --no-tests=error

      - name: Print compiler cache stats
        if: always()
        run: sccache --show-stats
