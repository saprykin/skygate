name: CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-core:
    name: Linux core build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            zlib1g-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: desktop
          archives: qtbase
          cache: true

      - name: Configure
        run: >
          cmake --preset core-debug
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          -DSKYGATE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset core-debug --parallel

      - name: Test
        run: >
          ctest --test-dir build-make/core-debug
          -LE slow
          --output-on-failure
          --no-tests=error
