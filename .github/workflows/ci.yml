name: CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-core:
    name: Linux core build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ccache \
            ninja-build \
            zlib1g-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: desktop
          archives: icu qtbase
          cache: true

      - name: Prepare compiler cache
        run: mkdir -p "$CCACHE_DIR"

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: linux-core-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            linux-core-ccache-${{ github.ref_name }}-
            linux-core-ccache-

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Configure
        run: >
          cmake --preset ci-core-debug
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset ci-core-debug --parallel

      - name: Test
        run: >
          ctest --test-dir build-ninja/ci-core-debug
          --parallel 2
          -LE slow
          --output-on-failure
          --no-tests=error

      - name: Print compiler cache stats
        if: always()
        run: ccache --show-stats
