name: Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      tag_version: ${{ steps.version.outputs.tag_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release tag version
        id: version
        run: |
          app_version="$(sed -nE 's/^set\(SKYGATE_APP_VERSION "([^"]+)".*/\1/p' CMakeLists.txt)"
          if [[ -z "${app_version}" ]]; then
            echo "Could not resolve SKYGATE_APP_VERSION from CMakeLists.txt." >&2
            exit 1
          fi

          tag_version=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              echo "Release tags must use vX.Y.Z format: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi

            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${app_version}" ]]; then
              echo "Release tag ${GITHUB_REF_NAME} does not match SKYGATE_APP_VERSION ${app_version}." >&2
              exit 1
            fi
          fi

          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "tag_version=${tag_version}" >> "${GITHUB_OUTPUT}"

  linux-appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: release-metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            curl \
            file \
            git \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1 \
            libfreetype6 \
            libgl-dev \
            libgl1 \
            libglib2.0-0 \
            libglx-dev \
            libice6 \
            libopengl-dev \
            libsm6 \
            libx11-xcb1 \
            libxau6 \
            libxcb-cursor0 \
            libxcb-glx0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb1 \
            libxcursor1 \
            libxdmcp6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxinerama1 \
            libxkbcommon-x11-0 \
            libxkbcommon0 \
            libxrandr2 \
            libxrender1 \
            mesa-common-dev \
            ninja-build \
            zlib1g-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          target: desktop
          archives: icu qtbase qtdeclarative
          cache: true

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Resolve package metadata
        id: package
        run: |
          short_sha="${GITHUB_SHA::12}"
          architecture="$(uname -m)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            artifact_name="SkyGate-Linux-${architecture}-AppImage-${GITHUB_REF_NAME}"
            release_title="SkyGate ${GITHUB_REF_NAME}"
          else
            version="latest-${short_sha}"
            artifact_name="SkyGate-Linux-${architecture}-AppImage-latest-${short_sha}"
            release_title=""
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"

      - name: Build AppImage
        env:
          SKYGATE_APPIMAGE_VERSION: ${{ steps.package.outputs.version }}
        run: ./packaging/linux/build-appimage.sh

      - name: Smoke test AppImage
        run: |
          mapfile -t appimages < <(find dist -maxdepth 1 -type f -name '*.AppImage' -print)
          if [[ "${#appimages[@]}" -ne 1 ]]; then
            printf 'Expected exactly one AppImage, found %d\n' "${#appimages[@]}" >&2
            printf '%s\n' "${appimages[@]}"
            exit 1
          fi

          appimage="${appimages[0]}"
          expected_architecture="$(uname -m)"
          case "${expected_architecture}" in
            x86_64)
              expected_architecture="x86_64"
              ;;
            aarch64|arm64)
              expected_architecture="aarch64"
              ;;
          esac

          [[ "${appimage}" == *"Linux-${expected_architecture}.AppImage" ]]
          test -x "${appimage}"
          rm -rf squashfs-root
          "${appimage}" --appimage-extract >/dev/null
          test -x squashfs-root/AppRun
          test -f squashfs-root/*.desktop
          test -x squashfs-root/usr/bin/skygate-ui
          test -f squashfs-root/usr/share/icons/hicolor/512x512/apps/skygate.png
          version_output="$(APPIMAGE_EXTRACT_AND_RUN=1 "${appimage}" --version)"
          echo "${version_output}"
          grep -q "SkyGate ${{ needs.release-metadata.outputs.app_version }}" <<< "${version_output}"

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.AppImage --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.AppImage \
              --title "${{ steps.package.outputs.release_title }}" \
              --generate-notes
          fi

  macos-dmg:
    name: macOS DMG
    runs-on: macos-15
    timeout-minutes: 45
    needs: release-metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          target: desktop
          archives: qtbase qtdeclarative qtpositioning
          cache: true

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Resolve package metadata
        id: package
        run: |
          short_sha="${GITHUB_SHA::12}"
          architecture="$(uname -m)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            artifact_name="SkyGate-macOS-${architecture}-DMG-${GITHUB_REF_NAME}"
            release_title="SkyGate ${GITHUB_REF_NAME}"
          else
            artifact_name="SkyGate-macOS-${architecture}-DMG-latest-${short_sha}"
            release_title=""
          fi

          echo "architecture=${architecture}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"

      - name: Configure
        run: >
          cmake -S . -B build-macos-dmg
          -DCMAKE_BUILD_TYPE=Release
          -DSKYGATE_BUILD_UI=ON
          -DSKYGATE_BUILD_TESTS=OFF
          -DSKYGATE_PACKAGE_ARCHITECTURE="${{ steps.package.outputs.architecture }}"
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build DMG
        run: cmake --build build-macos-dmg --target package-skygate-ui-dmg --parallel

      - name: Smoke test DMG
        run: |
          dmg_count="$(find build-macos-dmg/apps/skygate-ui -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d ' ')"
          if [[ "${dmg_count}" != "1" ]]; then
            echo "Expected exactly one DMG, found ${dmg_count}" >&2
            find build-macos-dmg/apps/skygate-ui -maxdepth 1 -type f -name '*.dmg' -print
            exit 1
          fi

          dmg="$(find build-macos-dmg/apps/skygate-ui -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          [[ "${dmg}" == *"Darwin-${{ steps.package.outputs.architecture }}"*.dmg ]]

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "${mount_dir}" -quiet || true
            rm -rf "${mount_dir}"
          }
          trap cleanup EXIT

          hdiutil attach "${dmg}" -nobrowse -readonly -mountpoint "${mount_dir}"
          app="${mount_dir}/SkyGate.app"
          executable="${app}/Contents/MacOS/SkyGate"
          test -d "${app}"
          test -x "${executable}"
          test -f "${app}/Contents/Info.plist"
          test -f "${app}/Contents/Resources/Skygate.icns"
          test -d "${app}/Contents/Frameworks/QtCore.framework"
          lipo -info "${executable}" | grep -q "${{ steps.package.outputs.architecture }}"
          otool -L "${executable}" | grep -q '@rpath/QtCore.framework'
          version_output="$("${executable}" --version)"
          echo "${version_output}"
          grep -q "SkyGate ${{ needs.release-metadata.outputs.app_version }}" <<< "${version_output}"

      - name: Inspect packaged app
        run: |
          app="build-macos-dmg/apps/skygate-ui/SkyGate-dmg/SkyGate.app"
          executable="${app}/Contents/MacOS/SkyGate"
          if [[ ! -x "${executable}" ]]; then
            echo "Missing packaged executable: ${executable}" >&2
            exit 1
          fi

          file "${executable}"
          lipo -info "${executable}"
          otool -L "${executable}"
          find "${app}/Contents/Frameworks" -maxdepth 3 -type f -print | while IFS= read -r file_path; do
            if [[ -x "${file_path}" ]]; then
              file "${file_path}"
            fi
          done

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: build-macos-dmg/apps/skygate-ui/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" build-macos-dmg/apps/skygate-ui/*.dmg --clobber
          else
            gh release create "${GITHUB_REF_NAME}" build-macos-dmg/apps/skygate-ui/*.dmg \
              --title "${{ steps.package.outputs.release_title }}" \
              --generate-notes
          fi

  windows-installer:
    name: Windows Installer
    runs-on: windows-2022
    timeout-minutes: 45
    needs: release-metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --yes --no-progress

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: desktop
          arch: win64_msvc2022_64
          archives: qtbase qtdeclarative qtpositioning
          cache: true

      - name: Configure vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot -and (Test-Path "C:\vcpkg")) {
            $vcpkgRoot = "C:\vcpkg"
          }
          if (-not $vcpkgRoot) {
            throw "Could not find vcpkg on the Windows runner."
          }
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Verify test fixtures
        run: git lfs fsck

      - name: Resolve package metadata
        id: package
        shell: pwsh
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 12)
          $architecture = "x86_64"
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $artifactName = "SkyGate-Windows-$architecture-Installer-$env:GITHUB_REF_NAME"
            $releaseTitle = "SkyGate $env:GITHUB_REF_NAME"
          } else {
            $artifactName = "SkyGate-Windows-$architecture-Installer-latest-$shortSha"
            $releaseTitle = ""
          }

          "architecture=$architecture" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "release_title=$releaseTitle" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        run: >
          cmake --preset ui-release-windows-vcpkg
          -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          -DSKYGATE_PACKAGE_ARCHITECTURE="${{ steps.package.outputs.architecture }}"

      - name: Build installer packages
        run: cmake --build --preset ui-package-windows-vcpkg --parallel

      - name: Smoke test installer packages
        shell: pwsh
        run: |
          $packageDir = "build-ninja/ui-release-windows-vcpkg"
          $msiPackages = @(Get-ChildItem -Path $packageDir -Filter *.msi)
          $zipPackages = @(Get-ChildItem -Path $packageDir -Filter *.zip)
          if ($msiPackages.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msiPackages.Count)."
          }
          if ($zipPackages.Count -ne 1) {
            throw "Expected exactly one ZIP, found $($zipPackages.Count)."
          }

          foreach ($package in @($msiPackages + $zipPackages)) {
            if ($package.Name -notlike "*Windows-${{ steps.package.outputs.architecture }}*") {
              throw "Package name does not include platform architecture: $($package.Name)"
            }
            if ($package.Length -le 0) {
              throw "Package is empty: $($package.FullName)"
            }
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "skygate-windows-package"
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $extractDir | Out-Null
          Expand-Archive -Path $zipPackages[0].FullName -DestinationPath $extractDir

          $executable = Get-ChildItem -Path $extractDir -Recurse -Filter skygate-ui.exe | Select-Object -First 1
          if (-not $executable) {
            throw "ZIP package does not contain skygate-ui.exe."
          }
          $qtCore = Get-ChildItem -Path $extractDir -Recurse -Filter Qt6Core.dll | Select-Object -First 1
          if (-not $qtCore) {
            throw "ZIP package does not contain Qt6Core.dll."
          }
          $qtQuick = Get-ChildItem -Path $extractDir -Recurse -Filter Qt6Quick.dll | Select-Object -First 1
          if (-not $qtQuick) {
            throw "ZIP package does not contain Qt6Quick.dll."
          }
          $versionOutput = & $($executable.FullName) --version
          Write-Output $versionOutput
          if ($versionOutput -notmatch "SkyGate ${{ needs.release-metadata.outputs.app_version }}") {
            throw "Unexpected packaged app version output: $versionOutput"
          }

      - name: Upload installer packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            build-ninja/ui-release-windows-vcpkg/*.msi
            build-ninja/ui-release-windows-vcpkg/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $packages = @(
            Get-ChildItem -Path build-ninja/ui-release-windows-vcpkg -Filter *.msi
            Get-ChildItem -Path build-ninja/ui-release-windows-vcpkg -Filter *.zip
          )
          if (-not $packages) {
            throw "No Windows packages were produced."
          }

          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:GITHUB_REF_NAME" @($packages.FullName) --clobber
          } else {
            gh release create "$env:GITHUB_REF_NAME" @($packages.FullName) `
              --title "${{ steps.package.outputs.release_title }}" `
              --generate-notes
          }
